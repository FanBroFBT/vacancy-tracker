{% extends 'main_app/base.html' %}

{% block title %}Post a Vacancy{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card p-4">
            <h3 class="fw-bold mb-3">Post a Vacancy</h3>
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Title</label>
                    {{ form.title }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    {{ form.description }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Requirements</label>
                    {{ form.requirements }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Level</label>
                    {{ form.level }}
                </div>

                <div class="mb-3">
                    <label class="form-label">City</label>
                    {{ form.city }}
                </div>

                <button type="submit" class="btn btn-primary">Create Vacancy</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
